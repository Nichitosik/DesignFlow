services:

  # ── PostgreSQL Database ────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: eventflow_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: eventflow_pass
      POSTGRES_DB: eventflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── App Server ─────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eventflow_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://postgres:eventflow_pass@db:5432/eventflow
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY:-}
    ports:
      - "5000:5000"

volumes:
  postgres_data:
